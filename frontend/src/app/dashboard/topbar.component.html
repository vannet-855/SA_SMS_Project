<header class="topbar">
  <div class="topbar__left">
    <div class="topbar__title">{{ title }}</div>
    <div class="topbar__subtitle">{{ subtitle }}</div>
  </div>

  <div class="topbar__right">
    <div class="search">
      <input type="text" placeholder="Search…" />
    </div>

    <div class="bell" aria-label="Alerts">
      <span class="bell__icon" aria-hidden="true">🔔</span>
      <span class="bell__badge">{{ alertsCount }}</span>
    </div>

    <button class="quick-add" type="button">+ Quick Add</button>
  </div>
</header>
